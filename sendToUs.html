<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
     <div style="text-align:start; background-color:rgb(245, 167, 0); margin: 20px; padding: 10px">
    <form
      action="http://primat.se/services/sendform.aspx?xid=registreringSkrotOchKron&xmail=demlyoafrin@gmail.com"

      method="post"
    >
      <h1>Fylla i</h1>

      <label for="name"> Ditt namn</label>
      <input id="name" type="text" name="name" required /> <br />
      <br />

      <label for="email"> Mail adress </label>
      <input id="email" type="email" name="email" required /> <br />
      <br />

      <label for="phone"> Mobil nummer</label>
      <input id="phone" type="tel" name="phone" required> <br> <br>

      <label for="city"> Stad</label>
      <input id="city" type="text" name="city" required /> <br />
      <br />
      <label for="Adress"> adress</label>
      <input id="Adress" type="text" name="Adress" required /> <br />
      <br />
      <label for="postnummer"> PostNummer</label>
      <input id="postnummer" type="text" name="postnummer" required /> <br />
      <br />

      <p>Välj</p>
      <input
        type="radio"
        name="privatOrBusiness"
        id="Private"
        value="Private"
        onclick="toggleSize(false)"
      />
      <label for="Private"> Privat</label> <br />

      <input
        type="radio"
        name="privatOrBusiness"
        id="Business"
        value="Business"
        onclick="toggleSize(true)"
      />
      <label for="Business"> Företag </label> <br />

      <div id="companySize" style="display: none; margin-top: 10px">
        <p>storlek av företag</p>
        <input type="radio" name="size" id="Hundred" value="Hundred" />
        <label for="Hundred"> 1 till 100 anställda</label> <br />

        <input type="radio" name="size" id="thousand" value="thousand" />
        <label for="thousand"> 100 till 1000 anställda</label> <br />

        <input
          type="radio"
          name="size"
          id="moreThanThousand"
          value="moreThanThousand"
        />
        <label for="MoreThanThousand"> Mer än 1000 anställda</label> <br />
      </div>
      <br />

      <script>
        function toggleSize(show) {
          document.getElementById("companySize").style.display = show
            ? "block"
            : "none";
        }
      </script>

      <label for="expectations"> Dina förväntningar</label> <br />
      <textarea
        id="expectations"
        name="expectations"
        rows="5"
        cols="45"
      ></textarea>
      <br />
      <br />

      <input type="checkbox" name="newslatter" value="ja" />
      <input type="hidden" name="newslatter" value="nej" />
      <label for="newslatter"> Jag vill ha nyhetsbrev </label> <br>

      <input type="checkbox" name="contactByPhone" value="ja" />
      <input type="hidden" name="contactByPhone" value="nej" />
      <label for="contactByPhone">Jag vill att kontakta vid telefonen</label> <br> <br>

      <input type="submit" value="Skicka" />  <br> <br>
      </div>
      

    <div style="text-align:start; background-color:rgb(244, 245, 241); margin: 20px; padding: 10px">
    <a href="index.html"> hem</a> 
    <a href="aboutus.html"> Om oss</a> 
    <a href="products.html"> Produkter </a> 
    </div>

    </form>
  </body>
</html>
